<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>自動花園管理裝置</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 20px;
            padding: 20px;
            max-width: 3000px;
            margin: 90px auto;
        }

        .box {
            height: 300px;
            border: 3px solid #ccc; 
            background-color: #ffffff; 
            
            
            display: flex;
            align-items: flex-start;   
            justify-content: flex-start; 
            
            padding: 15px;            
            box-sizing: border-box;    
            
            font-size: 20px;
            color: #fc04b1;               
        }
        header{
    background-color: #17d145d5;
        }
    h2,h3{
    color: #17d145d5;
        }
        h1{
            color: #f80505d5;
        }
        
    </style>
    
</head>
<body>
    <header>
    <h1>自動花園管理裝置</h1>
    <h2> .</h2>
    <h3>.</h3>
    </header>
    <div class="container">
        <div class="box">土壤濕度</div>
        <div class="box">環境溫度</div>
        <div class="box">環境濕度</div>
        <div class="box">光照強度</div>
    </div>

</body>
</html>
