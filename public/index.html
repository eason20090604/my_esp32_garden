<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自動花園監測系統 - 即時監控</title>
    <link rel="stylesheet" href="style2.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    
     <header>
    <h1>動機</h1>
    
    <ul>
        <li><a href="首頁.html">首頁</a></li>
        <li><a href="動機.html">動機</a></li>
        <li><a href="訂閱.html">訂閱</a></li>
        <li><a href="製作名單.html">製作名單</a></li>
        <li><a href="控制中心.html">控制中心</a></li>
    </ul>
    </header>

    <section class="標題">        
        <h2 id="status">系統連線中...</h2>
    </section>

    <div class="container">
        <div class="box">土壤濕度：<span id="soil-moisture">--</span> %</div>
        <div class="box">環境溫度：<span id="temp">--</span> °C</div>
        <div class="box">環境濕度：<span id="humidity">--</span> %</div>
        <div class="box">光照強度：<span id="lux">--</span> lx</div>
    </div>

    <script>
        const socket = io();

        // 監聽來自 Render 伺服器的數據
        socket.on('mqtt_data', (data) => {
            console.log("收到數據:", data);
            document.getElementById('status').innerText = "數據更新時間: " + new Date().toLocaleTimeString();
            
            // 這裡假設你的 ESP32 傳來的是一串 JSON 字串，例如 {"soil": 60, "temp": 25, "hum": 70, "lux": 500}
            // 如果你只傳一個單純的數字，可以直接更新其中一個
            try {
                const sensorData = JSON.parse(data);
                if(sensorData.soil) document.getElementById('soil-moisture').innerText = sensorData.soil;
                if(sensorData.temp) document.getElementById('temp').innerText = sensorData.temp;
                if(sensorData.hum) document.getElementById('humidity').innerText = sensorData.hum;
                if(sensorData.lux) document.getElementById('lux').innerText = sensorData.lux;
            } catch (e) {
                // 如果傳來的是單一純文字/數字，就暫時顯示在第一個方塊
                document.getElementById('soil-moisture').innerText = data;
            }
        });
    </script>
</body>
</html>
